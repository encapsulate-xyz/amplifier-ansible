---
- name: Include user creation task
  ansible.builtin.include_tasks: tasks/create_user_and_directories.yml
  vars:
    home: "{{ handler_home_dir }}"
    directories: "{{ handler_directories }}"
    log_file_path: "{{ handler_log_file_path }}"

- name: Copy base configuration file
  ansible.builtin.template:
    src: "{{ env }}/{{ type }}/config.toml.j2"
    dest: "{{ handler_base_config_file_path }}"
    owner: "{{ service_identifier }}"
    group: "{{ service_identifier }}"
    mode: "0644"
  notify:
    - Restart service

- name: Copy handler specific configuration file
  ansible.builtin.template:
    src: "{{ env }}/{{ type }}/handler_config.toml.j2"
    dest: "{{ handler_chain_config_file_path }}"
    owner: "{{ service_identifier }}"
    group: "{{ service_identifier }}"
    mode: "0644"
  notify:
    - Restart service

- name: Fetch the service binary
  vars:
    suffix_url: >
      {{ handler_default_binary_name[type] }}-{{ amplifier[type].version }}/{{
       handler_default_binary_name[type] }}-{{ ansible_system | lower }}-{{ system_architecture }}-{{ amplifier[type].version }}
  ansible.builtin.get_url:
    url: "{{ amplifier[type].source_url }}/{{ suffix_url }}"
    dest: "{{ handler_bin_dir }}/{{ service_identifier }}"
    owner: root
    group: root
    force: true
    mode: "0755"
  notify:
    - Restart service

- name: Copy systemd service file
  ansible.builtin.template:
    src: "{{ env }}/systemd.service.j2"
    dest: /etc/systemd/system/{{ service_identifier }}.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload service
    - Restart service
