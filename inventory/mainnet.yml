---
# maintains mainnet inventory grouped by project names
all:
  vars:
    env: mainnet
  children:
    amplifier:
      hosts:
        ts.tofnd.amplifier.axelar.mainnet.encapsulate.xyz:
          type: tofnd
        ts.amplifier.axelar.mainnet.encapsulate.xyz:
          type: ampd
        amplifier_flow_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: flow
        amplifier_xrplevm_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: xrplevm
        amplifier_plume_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: plume
        amplifier_monad_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: monad
        amplifier_berachain_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: berachain
        amplifier_hyperliquid_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: hyperliquid
        amplifier_hedera_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: hedera
        amplifier_sui_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: sui
        amplifier_xrpl_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: xrpl
        amplifier_stellar_host:
          ansible_host: ts.amplifier.axelar.mainnet.encapsulate.xyz
          type: stellar
